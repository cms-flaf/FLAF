name: Test Setup Loading

on:
  workflow_call:
    inputs:
      eras:
        required: true
        type: string
        description: 'Space-separated list of eras to test (e.g. "Run3_2022 Run3_2022EE")'

permissions:
  contents: read

jobs:
  test-setup-loading:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: cms-flaf/FLAF/.github/actions/checkout-flaf@main

      - name: Initialize FLAF submodules
        run: |
          cd FLAF
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml law luigi

      - name: Run Setup loading test
        run: python FLAF/test/test_setup_loading.py ${{ inputs.eras }}
