name: Trigger the FLAF integration pipeline

on:
  issue_comment:
    types: [ "created", "edited" ]
  workflow_call:

permissions:
  contents: read
  issues: write

jobs:
  process-trigger-request:
    runs-on: ubuntu-latest
    steps:

      - name: Validate PR trigger request
        id: validate_trigger_request
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.payload.issue && context.payload.issue.pull_request ? context.payload.issue.number : null;
            if (!prNumber) {
              console.log('Not a PR event. Skipping.');
              core.setOutput('should_continue', 'false');
              return;
            }

            const commentAuthor = context.payload.comment.user.login;
            const modifiedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const githubAreaModified = modifiedFiles.some(file => file.filename.startsWith('.github/'));
            if (githubAreaModified && commentAuthor !== 'kandrosov') {
              console.log(`.github area is modified and user ${commentAuthor} is not authorized to trigger the pipeline.`);
              core.setOutput('should_continue', 'false');
              return;
            }

            core.setOutput('should_continue', 'true');

      - name: Checkout repository
        if: ${{ steps.validate_trigger_request.outputs.should_continue == 'true' }}
        uses: actions/checkout@v4

      - name: Checkout PR branch
        if: ${{ steps.validate_trigger_request.outputs.should_continue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr checkout ${{ github.event.issue.number }}

      - name: Detect workflow override files
        if: ${{ steps.validate_trigger_request.outputs.should_continue == 'true' }}
        id: detect_workflow_files
        uses: actions/github-script@v6
        with:
          script: |
            const workflowFiles = new Set([
              '.github/workflows/trigger-flaf-integration.yaml',
              '.github/scripts/trigger-flaf-integration-parse.js',
              '.github/scripts/trigger-flaf-integration-trigger.js',
            ]);
            const modifiedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            const useLocalWorkflowCode =
              context.repo.repo === 'FLAF' &&
              modifiedFiles.some(file => workflowFiles.has(file.filename));
            core.setOutput('use_local_workflow_code', useLocalWorkflowCode ? 'true' : 'false');
            core.setOutput('needs_shared_workflow_repo', useLocalWorkflowCode ? 'false' : 'true');

      - name: Checkout shared FLAF workflow repository
        if: ${{ steps.validate_trigger_request.outputs.should_continue == 'true' && steps.detect_workflow_files.outputs.needs_shared_workflow_repo == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: cms-flaf/FLAF
          ref: main
          path: _shared_flaf_workflow

      - name: Install js-yaml
        if: ${{ steps.validate_trigger_request.outputs.should_continue == 'true' }}
        run: npm install js-yaml

      - name: Parse comment
        if: ${{ steps.validate_trigger_request.outputs.should_continue == 'true' }}
        id: parse_comment
        uses: actions/github-script@v6
        env:
          CONFIG_PATH: .github/integration_cfg.yaml
          SHARED_WORKFLOW_PATH: _shared_flaf_workflow
          USE_LOCAL_WORKFLOW_CODE: ${{ steps.detect_workflow_files.outputs.use_local_workflow_code }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const localScriptPath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'scripts', 'trigger-flaf-integration-parse.js');
            const sharedScriptPath = path.join(process.env.GITHUB_WORKSPACE, process.env.SHARED_WORKFLOW_PATH, '.github', 'scripts', 'trigger-flaf-integration-parse.js');
            const useLocalWorkflowCode = process.env.USE_LOCAL_WORKFLOW_CODE === 'true';
            const scriptPath = useLocalWorkflowCode && fs.existsSync(localScriptPath) ? localScriptPath : sharedScriptPath;

            console.log(`Using parse script: ${scriptPath}`);
            const run = require(scriptPath);
            await run({ github, context, core, process, require });

      - name: Trigger FLAF integration pipeline
        if: ${{ steps.parse_comment.outputs.trigger_pipeline == 'true' }}
        id: trigger_flaf_integration_pipeline
        uses: actions/github-script@v6
        env:
          FLAF_INTEGRATION_TOKEN: ${{ secrets.FLAF_INTEGRATION_TOKEN }}
          VARIABLES: ${{ steps.parse_comment.outputs.variables }}
          GITLAB_URL: ${{ steps.parse_comment.outputs.gitlab_url }}
          GITLAB_BRANCH: ${{ steps.parse_comment.outputs.gitlab_branch }}
          SHARED_WORKFLOW_PATH: _shared_flaf_workflow
          USE_LOCAL_WORKFLOW_CODE: ${{ steps.detect_workflow_files.outputs.use_local_workflow_code }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const localScriptPath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'scripts', 'trigger-flaf-integration-trigger.js');
            const sharedScriptPath = path.join(process.env.GITHUB_WORKSPACE, process.env.SHARED_WORKFLOW_PATH, '.github', 'scripts', 'trigger-flaf-integration-trigger.js');
            const useLocalWorkflowCode = process.env.USE_LOCAL_WORKFLOW_CODE === 'true';
            const scriptPath = useLocalWorkflowCode && fs.existsSync(localScriptPath) ? localScriptPath : sharedScriptPath;

            console.log(`Using trigger script: ${scriptPath}`);
            const run = require(scriptPath);
            await run({ core, process, fetch, JSON, URLSearchParams, console });

      - name: Post comment
        if: ${{ steps.trigger_flaf_integration_pipeline.outputs.send_message == 'true' }}
        id: post_comment
        env:
          FLAF_GITHUB_TOKEN: ${{ secrets.FLAF_GITHUB_TOKEN }}
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${FLAF_GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -d '{"body": "${{ steps.trigger_flaf_integration_pipeline.outputs.message }}"}'

      - name: React with thumbs down on failure to start pipeline
        if: ${{ always() && steps.parse_comment.outputs.bot_mentioned == 'true' && steps.trigger_flaf_integration_pipeline.outputs.send_message != 'true' }}
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '-1',
            });
